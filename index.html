<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'inter': ['Inter', 'sans-serif'],
            'poppins': ['Poppins', 'sans-serif'],
          },
          colors: {
            'navy-dark': '#0F0C29',
            'purple-mid': '#302B63',
            'purple-light': '#24243e',
            'accent-violet': '#7F5AF0',
            'accent-blue': '#6C63FF',
            'dark-text': '#1A1A2E',
          }
        }
      }
    }
  </script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glass-input:focus {
      box-shadow: 0 0 20px rgba(127, 90, 240, 0.3);
      border-color: rgba(127, 90, 240, 0.5);
    }

    .neu-card {
      background: #FFFFFF;
      box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.08), -8px -8px 20px rgba(255, 255, 255, 0.9);
    }

    .neu-inset {
      background: #F0F0F3;
      box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.06), inset -4px -4px 8px rgba(255, 255, 255, 0.8);
    }

    .neu-button {
      background: linear-gradient(145deg, #FFFFFF, #E6E6E9);
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.9);
    }

    .neu-button:hover {
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.1), -2px -2px 6px rgba(255, 255, 255, 0.9);
    }

    .neu-button:active {
      box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.1), inset -2px -2px 6px rgba(255, 255, 255, 0.9);
    }

    .pill-active {
      background: linear-gradient(135deg, #7F5AF0, #6C63FF);
      box-shadow: 0 4px 15px rgba(127, 90, 240, 0.4);
    }

    .swap-btn {
      transition: transform 0.3s ease;
    }

    .swap-btn:hover {
      transform: rotate(180deg);
    }

    .sidebar-item.active {
      background: rgba(108, 99, 255, 0.1);
      border-left: 3px solid #6C63FF;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(127, 90, 240, 0.2); }
      50% { box-shadow: 0 0 30px rgba(127, 90, 240, 0.4); }
    }

    .glow-pulse {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(127, 90, 240, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(127, 90, 240, 0.5);
    }

    .dark-mode .neu-card {
      background: #1E1E2E;
      box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.3), -8px -8px 20px rgba(50, 50, 70, 0.2);
    }

    .dark-mode .neu-inset {
      background: #16161F;
      box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.3), inset -4px -4px 8px rgba(50, 50, 70, 0.1);
    }

    .dark-mode .neu-button {
      background: linear-gradient(145deg, #2A2A3E, #1E1E2E);
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.3), -4px -4px 10px rgba(50, 50, 70, 0.1);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="h-full w-full"></div>
  <script>
    const defaultConfig = {
      app_title: 'Unit Converter',
      from_label: 'From',
      to_label: 'To',
      background_color: '#0F0C29',
      accent_color: '#7F5AF0',
      text_color: '#FFFFFF',
      card_color: '#FFFFFF',
      secondary_color: '#6C63FF'
    };

    const categories = [
      { id: 'length', name: 'Length', icon: '📏' },
      { id: 'temperature', name: 'Temperature', icon: '🌡️' },
      { id: 'area', name: 'Area', icon: '📐' },
      { id: 'volume', name: 'Volume', icon: '🧪' },
      { id: 'weight', name: 'Weight', icon: '⚖️' },
      { id: 'time', name: 'Time', icon: '⏱️' }
    ];

    const units = {
      length: [
        { id: 'meter', name: 'Meter', symbol: 'm', factor: 1 },
        { id: 'kilometer', name: 'Kilometer', symbol: 'km', factor: 1000 },
        { id: 'centimeter', name: 'Centimeter', symbol: 'cm', factor: 0.01 },
        { id: 'millimeter', name: 'Millimeter', symbol: 'mm', factor: 0.001 },
        { id: 'micrometer', name: 'Micrometer', symbol: 'μm', factor: 0.000001 },
        { id: 'nanometer', name: 'Nanometer', symbol: 'nm', factor: 0.000000001 },
        { id: 'mile', name: 'Mile', symbol: 'mi', factor: 1609.344 },
        { id: 'yard', name: 'Yard', symbol: 'yd', factor: 0.9144 },
        { id: 'foot', name: 'Foot', symbol: 'ft', factor: 0.3048 },
        { id: 'inch', name: 'Inch', symbol: 'in', factor: 0.0254 },
        { id: 'lightyear', name: 'Light Year', symbol: 'ly', factor: 9.461e15 }
      ],
      temperature: [
        { id: 'celsius', name: 'Celsius', symbol: '°C' },
        { id: 'kelvin', name: 'Kelvin', symbol: 'K' },
        { id: 'fahrenheit', name: 'Fahrenheit', symbol: '°F' }
      ],
      area: [
        { id: 'sqmeter', name: 'Square Meter', symbol: 'm²', factor: 1 },
        { id: 'sqkilometer', name: 'Square Kilometer', symbol: 'km²', factor: 1000000 },
        { id: 'sqcentimeter', name: 'Square Centimeter', symbol: 'cm²', factor: 0.0001 },
        { id: 'sqmillimeter', name: 'Square Millimeter', symbol: 'mm²', factor: 0.000001 },
        { id: 'sqmicrometer', name: 'Square Micrometer', symbol: 'μm²', factor: 0.000000000001 },
        { id: 'hectare', name: 'Hectare', symbol: 'ha', factor: 10000 },
        { id: 'sqmile', name: 'Square Mile', symbol: 'mi²', factor: 2589988.110336 },
        { id: 'sqyard', name: 'Square Yard', symbol: 'yd²', factor: 0.836127 },
        { id: 'sqfoot', name: 'Square Foot', symbol: 'ft²', factor: 0.092903 },
        { id: 'sqinch', name: 'Square Inch', symbol: 'in²', factor: 0.00064516 },
        { id: 'acre', name: 'Acre', symbol: 'ac', factor: 4046.8564224 }
      ],
      volume: [
        { id: 'cubicmeter', name: 'Cubic Meter', symbol: 'm³', factor: 1 },
        { id: 'cubickilometer', name: 'Cubic Kilometer', symbol: 'km³', factor: 1000000000 },
        { id: 'cubiccentimeter', name: 'Cubic Centimeter', symbol: 'cm³', factor: 0.000001 },
        { id: 'cubicmillimeter', name: 'Cubic Millimeter', symbol: 'mm³', factor: 0.000000001 },
        { id: 'liter', name: 'Liter', symbol: 'L', factor: 0.001 },
        { id: 'milliliter', name: 'Milliliter', symbol: 'mL', factor: 0.000001 },
        { id: 'usgallon', name: 'US Gallon', symbol: 'gal', factor: 0.00378541 },
        { id: 'usquart', name: 'US Quart', symbol: 'qt', factor: 0.000946353 },
        { id: 'uspint', name: 'US Pint', symbol: 'pt', factor: 0.000473176 },
        { id: 'uscup', name: 'US Cup', symbol: 'cup', factor: 0.000236588 },
        { id: 'usfluidounce', name: 'US Fluid Ounce', symbol: 'fl oz', factor: 0.0000295735 }
      ],
      weight: [
        { id: 'kilogram', name: 'Kilogram', symbol: 'kg', factor: 1 },
        { id: 'gram', name: 'Gram', symbol: 'g', factor: 0.001 },
        { id: 'milligram', name: 'Milligram', symbol: 'mg', factor: 0.000001 },
        { id: 'metricton', name: 'Metric Ton', symbol: 't', factor: 1000 },
        { id: 'longton', name: 'Long Ton', symbol: 'LT', factor: 1016.0469088 },
        { id: 'shortton', name: 'Short Ton', symbol: 'ST', factor: 907.18474 },
        { id: 'pound', name: 'Pound', symbol: 'lb', factor: 0.453592 },
        { id: 'ounce', name: 'Ounce', symbol: 'oz', factor: 0.0283495 },
        { id: 'carat', name: 'Carat', symbol: 'ct', factor: 0.0002 },
        { id: 'amu', name: 'Atomic Mass Unit', symbol: 'u', factor: 1.66053906660e-27 }
      ],
      time: [
        { id: 'second', name: 'Second', symbol: 's', factor: 1 },
        { id: 'millisecond', name: 'Millisecond', symbol: 'ms', factor: 0.001 },
        { id: 'microsecond', name: 'Microsecond', symbol: 'μs', factor: 0.000001 },
        { id: 'nanosecond', name: 'Nanosecond', symbol: 'ns', factor: 0.000000001 },
        { id: 'picosecond', name: 'Picosecond', symbol: 'ps', factor: 0.000000000001 },
        { id: 'minute', name: 'Minute', symbol: 'min', factor: 60 },
        { id: 'hour', name: 'Hour', symbol: 'h', factor: 3600 },
        { id: 'day', name: 'Day', symbol: 'd', factor: 86400 },
        { id: 'week', name: 'Week', symbol: 'wk', factor: 604800 },
        { id: 'month', name: 'Month', symbol: 'mo', factor: 2592000 },
        { id: 'year', name: 'Year', symbol: 'yr', factor: 31536000 }
      ]
    };

    let state = {
      category: 'length',
      fromUnit: 'meter',
      toUnit: 'kilometer',
      fromValue: '1',
      toValue: '0.001',
      history: [],
      darkMode: false,
      view: window.innerWidth >= 1024 ? 'desktop' : 'mobile'
    };

    function convertTemperature(value, from, to) {
      let celsius;
      if (from === 'celsius') celsius = value;
      else if (from === 'fahrenheit') celsius = (value - 32) * 5/9;
      else celsius = value - 273.15;

      if (to === 'celsius') return celsius;
      else if (to === 'fahrenheit') return celsius * 9/5 + 32;
      else return celsius + 273.15;
    }

    function convert(value, category, fromUnit, toUnit) {
      if (!value || isNaN(parseFloat(value))) return '';
      const val = parseFloat(value);

      if (category === 'temperature') {
        return convertTemperature(val, fromUnit, toUnit).toFixed(4);
      }

      const fromUnitData = units[category].find(u => u.id === fromUnit);
      const toUnitData = units[category].find(u => u.id === toUnit);

      if (!fromUnitData || !toUnitData) return '';

      const baseValue = val * fromUnitData.factor;
      return (baseValue / toUnitData.factor).toFixed(6).replace(/\.?0+$/, '');
    }

    function addToHistory(from, to, fromUnit, toUnit, category) {
      const entry = {
        from,
        to,
        fromUnit: units[category].find(u => u.id === fromUnit)?.symbol || fromUnit,
        toUnit: units[category].find(u => u.id === toUnit)?.symbol || toUnit,
        category,
        time: new Date().toLocaleTimeString()
      };
      state.history = [entry, ...state.history.slice(0, 9)];
    }

    function renderMobile(config) {
      const categoryUnits = units[state.category];

      return `
        <div class="min-h-full w-full font-inter" style="background: linear-gradient(180deg, ${config.background_color} 0%, #302B63 50%, #24243e 100%);">
          <!-- Header -->
          <header class="px-6 pt-6 pb-4">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl glass-card flex items-center justify-center">
                  <span class="text-xl">⚡</span>
                </div>
                <h1 id="mobile-title" class="text-xl font-bold" style="color: ${config.text_color};">${config.app_title}</h1>
              </div>
              <button class="w-10 h-10 rounded-xl glass-card flex items-center justify-center" style="color: ${config.text_color};">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
              </button>
            </div>
          </header>

          <!-- Category Pills -->
          <div class="px-4 pb-4 overflow-x-auto">
            <div class="flex gap-2 pb-2" style="min-width: max-content;">
              ${categories.slice(0, 6).map(cat => `
                <button onclick="selectCategory('${cat.id}')"
                  class="px-4 py-2.5 rounded-full text-sm font-medium transition-all duration-300 flex items-center gap-2 min-w-max ${state.category === cat.id ? 'pill-active text-white' : 'glass-card'}"
                  style="${state.category !== cat.id ? `color: ${config.text_color};` : ''}">
                  <span>${cat.icon}</span>
                  <span>${cat.name}</span>
                </button>
              `).join('')}
            </div>
          </div>

          <!-- Main Conversion Card -->
          <div class="px-4 pb-4">
            <div class="glass-card rounded-3xl p-6 glow-pulse">
              <!-- From Section -->
              <div class="mb-4">
                <label id="mobile-from-label" class="text-sm font-medium mb-2 block" style="color: ${config.accent_color};">${config.from_label}</label>
                <div class="flex gap-3">
                  <input type="number" id="mobile-from-input" value="${state.fromValue}"
                    oninput="handleFromInput(this.value)"
                    class="flex-1 glass-input rounded-2xl px-4 py-4 text-lg font-semibold outline-none transition-all"
                    style="color: ${config.text_color};" placeholder="Enter value">
                  <select id="mobile-from-select" onchange="handleFromUnitChange(this.value)"
                    class="glass-input rounded-2xl px-4 py-4 text-sm font-medium outline-none appearance-none cursor-pointer min-w-24"
                    style="color: ${config.text_color}; background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22white%22 viewBox=%220 0 24 24%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;">
                    ${categoryUnits.map(u => `<option value="${u.id}" ${state.fromUnit === u.id ? 'selected' : ''} style="background: #24243e;">${u.symbol}</option>`).join('')}
                  </select>
                </div>
              </div>

              <!-- Swap Button -->
              <div class="flex justify-center my-4">
                <button onclick="swapUnits()" class="swap-btn w-12 h-12 rounded-full flex items-center justify-center" style="background: ${config.accent_color};">
                  <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                  </svg>
                </button>
              </div>

              <!-- To Section -->
              <div>
                <label id="mobile-to-label" class="text-sm font-medium mb-2 block" style="color: ${config.accent_color};">${config.to_label}</label>
                <div class="flex gap-3">
                  <input type="text" id="mobile-to-input" value="${state.toValue}" readonly
                    class="flex-1 glass-input rounded-2xl px-4 py-4 text-lg font-semibold outline-none bg-opacity-50"
                    style="color: ${config.text_color};">
                  <select id="mobile-to-select" onchange="handleToUnitChange(this.value)"
                    class="glass-input rounded-2xl px-4 py-4 text-sm font-medium outline-none appearance-none cursor-pointer min-w-24"
                    style="color: ${config.text_color}; background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22white%22 viewBox=%220 0 24 24%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;">
                    ${categoryUnits.map(u => `<option value="${u.id}" ${state.toUnit === u.id ? 'selected' : ''} style="background: #24243e;">${u.symbol}</option>`).join('')}
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Recent Conversions -->
          <div class="px-4 pb-24">
            <div class="glass-card rounded-2xl p-4">
              <h3 class="text-sm font-semibold mb-3" style="color: ${config.text_color};">Recent Conversions</h3>
              <div class="space-y-2 max-h-40 overflow-y-auto">
                ${state.history.length === 0 ? `
                  <p class="text-sm opacity-50" style="color: ${config.text_color};">No conversions yet</p>
                ` : state.history.map(h => `
                  <div class="flex justify-between items-center py-2 border-b border-white/10">
                    <span class="text-sm" style="color: ${config.text_color};">${h.from} ${h.fromUnit} → ${h.to} ${h.toUnit}</span>
                    <span class="text-xs opacity-50" style="color: ${config.text_color};">${h.time}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <!-- Bottom Navigation -->
          <nav class="fixed bottom-0 left-0 right-0 glass-card border-t border-white/10 px-6 py-4">
            <div class="flex justify-around items-center">
              <button class="flex flex-col items-center gap-1" style="color: ${config.accent_color};">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-xs font-medium">Home</span>
              </button>
              <button class="flex flex-col items-center gap-1 opacity-60" style="color: ${config.text_color};">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
                <span class="text-xs font-medium">History</span>
              </button>
              <button class="flex flex-col items-center gap-1 opacity-60" style="color: ${config.text_color};">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                <span class="text-xs font-medium">Settings</span>
              </button>
            </div>
          </nav>
        </div>
      `;
    }

    function renderDesktop(config) {
      const categoryUnits = units[state.category];
      const currentCategory = categories.find(c => c.id === state.category);

      const commonConversions = [
        { from: 1, fromUnit: categoryUnits[0], to: convert(1, state.category, categoryUnits[0].id, categoryUnits[1]?.id || categoryUnits[0].id), toUnit: categoryUnits[1] || categoryUnits[0] },
        { from: 10, fromUnit: categoryUnits[0], to: convert(10, state.category, categoryUnits[0].id, categoryUnits[1]?.id || categoryUnits[0].id), toUnit: categoryUnits[1] || categoryUnits[0] },
        { from: 100, fromUnit: categoryUnits[0], to: convert(100, state.category, categoryUnits[0].id, categoryUnits[1]?.id || categoryUnits[0].id), toUnit: categoryUnits[1] || categoryUnits[0] },
        { from: 1000, fromUnit: categoryUnits[0], to: convert(1000, state.category, categoryUnits[0].id, categoryUnits[1]?.id || categoryUnits[0].id), toUnit: categoryUnits[1] || categoryUnits[0] }
      ];

      return `
        <div class="min-h-full w-full font-poppins dark-mode" style="background: #0F0C29;">
          <div class="flex h-full">
            <!-- Sidebar -->
            <aside class="w-60 flex-shrink-0 p-4 h-full" style="background: #16161F; box-shadow: 2px 0 20px rgba(0,0,0,0.3);">
              <div class="flex items-center gap-3 mb-8 px-2">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, ${config.accent_color}, ${config.secondary_color});">
                  <span class="text-xl">⚡</span>
                </div>
                <h1 id="desktop-title" class="text-lg font-bold" style="color: #FFFFFF;">${config.app_title}</h1>
              </div>

              <nav class="space-y-1">
                ${categories.map(cat => `
                  <button onclick="selectCategory('${cat.id}')"
                    class="sidebar-item w-full flex items-center gap-3 px-3 py-3 rounded-xl text-left transition-all ${state.category === cat.id ? 'active' : ''}"
                    style="color: ${state.category === cat.id ? config.secondary_color : 'rgba(255,255,255,0.7)'};">
                    <span class="text-lg">${cat.icon}</span>
                    <span class="font-medium">${cat.name}</span>
                  </button>
                `).join('')}
              </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-8 overflow-auto">
              <!-- Top Header -->
              <header class="flex items-center justify-between mb-8">
                <div class="flex-1 max-w-md">

      }

      render(window.elementSdk?.config || defaultConfig);

    window.handleToUnitChange = function(unitId) {

      render(window.elementSdk?.config || defaultConfig);
